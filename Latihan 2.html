<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2 - Operasi Matematika</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 420px;">
            <h3 class="mb-3">Latihan Operasi Matematika</h3>
            <p class="text-muted">Klik tombol untuk memasukkan 2 angka.</p>

            <button class="btn btn-success w-100" onclick="hitung()">
                Mulai Perhitungan
            </button>
        </div>
    </div>

    <script>
        function hitung() {
            let angka1 = prompt("Masukkan angka pertama:");
            let angka2 = prompt("Masukkan angka kedua:");

            // Konversi ke tipe number
            angka1 = parseFloat(angka1);
            angka2 = parseFloat(angka2);

            if (isNaN(angka1) || isNaN(angka2)) {
                alert("Input harus berupa angka yang valid!");
                return;
            }

            let tambah = angka1 + angka2;
            let kurang = angka1 - angka2;
            let kali = angka1 * angka2;
            let bagi = angka2 !== 0 ? angka1 / angka2 : "Tidak bisa dibagi dengan 0";

            alert(
                "Hasil Perhitungan:\n\n" +
                "Penjumlahan: " + tambah + "\n" +
                "Pengurangan: " + kurang + "\n" +
                "Perkalian: " + kali + "\n" +
                "Pembagian: " + bagi
            );
        }
    </script>

</body>
</html>
