<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Testing Logika Nilai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">
                    
                    <h3 class="mb-4 fw-bold text-primary">Testing Logika Nilai</h3>
                    
                    <p class="fs-5">Nilai Saat Ini:</p>
                    <h1 class="display-5 fw-bold text-dark" id="nilaiDisplay">80</h1>
                    
                    <button class="btn btn-primary btn-lg mt-3 px-4" onclick="cekNilai()">
                        Cek Grade
                    </button>
                    
                    <div class="mt-4">
                        <h4>Hasil:</h4>
                        <span id="hasil" class="badge bg-secondary fs-5 px-4 py-2">
                            Belum Dicek
                        </span>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function cekNilai() {
    let nilai = 80;
    let hasil = "";

    if (nilai >= 85) {
        hasil = "A";
        document.getElementById("hasil").className = "badge bg-success fs-5 px-4 py-2";
    } 
    else if (nilai >= 75) {
        hasil = "B";
        document.getElementById("hasil").className = "badge bg-primary fs-5 px-4 py-2";
    } 
    else {
        hasil = "C";
        document.getElementById("hasil").className = "badge bg-danger fs-5 px-4 py-2";
    }

    document.getElementById("hasil").innerText = hasil;
}
</script>

</body>
</html>
