<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Input & Output JavaScript</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 400px;">
            <h3 class="mb-3">Latihan JavaScript</h3>
            <p class="text-muted">Klik tombol di bawah untuk memulai.</p>
            <button class="btn btn-primary w-100" onclick="tanyaNama()">
                Mulai
            </button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function tanyaNama() {
            let nama = prompt("Masukkan nama mahasiswa:");

            if (nama !== null && nama.trim() !== "") {
                alert("Halo " + nama + ", selamat Belajar JavaScript!");
            } else {
                alert("Nama tidak boleh kosong.");
            }
        }
    </script>

</body>
</html>
