<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 4 - Percabangan Majemuk</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 450px;">
            <h3 class="mb-3">Program Penentuan Grade Nilai</h3>
            <p class="text-muted">Klik tombol untuk memasukkan nilai mahasiswa.</p>

            <button class="btn btn-success w-100" onclick="tentukanGrade()">
                Cek Grade
            </button>
        </div>
    </div>

    <script>
        function tentukanGrade() {
            let nilai = prompt("Masukkan nilai mahasiswa:");
            nilai = parseFloat(nilai);

            if (isNaN(nilai)) {
                alert("Input harus berupa angka yang valid!");
                return;
            }

            let grade;

            if (nilai >= 85) {
                grade = "A";
            } else if (nilai >= 75) {
                grade = "B";
            } else if (nilai >= 65) {
                grade = "C";
            } else if (nilai >= 50) {
                grade = "D";
            } else {
                grade = "E";
            }

            alert("Nilai: " + nilai + "\nGrade: " + grade);
        }
    </script>

</body>
</html>
