<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2 - Sistem Login Sederhana</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 450px;">
            <h3 class="mb-3">Sistem Login Sederhana</h3>
            <p class="text-muted">
                Program menggunakan prompt() dan alert().
            </p>

            <button class="btn btn-primary w-100" onclick="login()">
                Login
            </button>
        </div>
    </div>

    <script>
        function login() {
            let username = prompt("Masukkan username:");
            let password = prompt("Masukkan password:");

            const USERNAME_BENAR = "alfian";
            const PASSWORD_BENAR = "110407";

            if (username === USERNAME_BENAR && password === PASSWORD_BENAR) {
                alert("Login berhasil ✅\nSelamat datang, " + username + "!");
            } else {
                alert("Login gagal ❌\nUsername atau password salah.");
            }
        }
    </script>

</body>
</html>
