<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Mini Game Tebak Angka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center mb-3">🎯 Mini Game Tebak Angka</h3>
        <p class="text-center text-muted">Tebak angka dari 1 sampai 10</p>

        <div class="mb-3">
            <input type="number" id="guessInput" class="form-control" placeholder="Masukkan angka (1-10)" min="1" max="10">
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="checkGuess()">Tebak!</button>
            <button class="btn btn-secondary" onclick="resetGame()">Reset Game</button>
        </div>

        <div class="mt-3 text-center">
            <h5 id="resultMessage"></h5>
        </div>
    </div>

<script>
    let randomNumber = Math.floor(Math.random() * 10) + 1;

    function checkGuess() {
        const userGuess = parseInt(document.getElementById("guessInput").value);
        const resultMessage = document.getElementById("resultMessage");

        if (!userGuess || userGuess < 1 || userGuess > 10) {
            resultMessage.innerHTML = "<span class='text-warning'>Masukkan angka antara 1 sampai 10!</span>";
            return;
        }

        if (userGuess === randomNumber) {
            resultMessage.innerHTML = "<span class='text-success'>🎉 Tebakan Anda benar!</span>";
        } else {
            resultMessage.innerHTML = "<span class='text-danger'>❌ Tebakan Anda salah! Coba lagi.</span>";
        }
    }

    function resetGame() {
        randomNumber = Math.floor(Math.random() * 10) + 1;
        document.getElementById("guessInput").value = "";
        document.getElementById("resultMessage").innerHTML = "";
    }
</script>

</body>
</html>
