<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 3 - Percabangan IF</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center" style="width: 420px;">
            <h3 class="mb-3">Program Penentu Kelulusan</h3>
            <p class="text-muted">Klik tombol untuk memasukkan nilai.</p>

            <button class="btn btn-primary w-100" onclick="cekKelulusan()">
                Cek Kelulusan
            </button>
        </div>
    </div>

    <script>
        function cekKelulusan() {
            let nilai = prompt("Masukkan nilai mahasiswa:");

            nilai = parseFloat(nilai);

            if (isNaN(nilai)) {
                alert("Input harus berupa angka yang valid!");
                return;
            }

            if (nilai >= 75) {
                alert("Nilai: " + nilai + "\nStatus: LULUS 🎉");
            } else {
                alert("Nilai: " + nilai + "\nStatus: TIDAK LULUS ❌");
            }
        }
    </script>

</body>
</html>
